name: Start EC2 GPU Runner
description: >
  Provisions an on-demand EC2 GPU instance, mounts the ephemeral NVMe SSD
  for Docker storage and the runner workspace, and registers it as a
  GitHub Actions self-hosted runner.

inputs:
  aws-access-key-id:
    description: AWS access key ID for EC2 operations
    required: true
  aws-secret-access-key:
    description: AWS secret access key for EC2 operations
    required: true
  aws-region:
    description: AWS region to launch the EC2 instance in
    required: true
  github-token:
    description: GitHub PAT with repo scope for runner registration
    required: true
  ec2-image-id:
    description: AMI ID for the EC2 instance
    required: true
  ec2-instance-type:
    description: EC2 instance type (e.g. p5.4xlarge)
    required: true
  subnet-id:
    description: VPC subnet ID to launch the instance in
    required: true
  security-group-id:
    description: Security group ID for the instance
    required: true

outputs:
  label:
    description: Unique label assigned to the runner (use as runs-on value)
    value: ${{ steps.result.outputs.label }}
  ec2-instance-id:
    description: EC2 instance ID (needed for termination)
    value: ${{ steps.result.outputs.ec2-instance-id }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
      with:
        aws-region: ${{ inputs.aws-region }}
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}

    - name: Start EC2 runner
      id: start
      continue-on-error: true
      uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef # v2
      with:
        mode: start
        github-token: ${{ inputs.github-token }}
        ec2-image-id: ${{ inputs.ec2-image-id }}
        ec2-instance-type: ${{ inputs.ec2-instance-type }}
        subnet-id: ${{ inputs.subnet-id }}
        security-group-id: ${{ inputs.security-group-id }}
        aws-resource-tags: >
          [
            {"Key": "GitHubRunId", "Value": "${{ github.run_id }}"},
            {"Key": "GitHubRepository", "Value": "${{ github.repository }}"}
          ]
        # IMPORTANT: The machulav action embeds this script inside an
        # echo "..." > file shell command, so double quotes and $ signs
        # are interpreted by bash at write time, not at execution time.
        # Always use single quotes for strings and inline paths directly.
        #
        # The AWS Deep Learning AMI initializes the p5.4xlarge ephemeral
        # NVMe SSD itself via dlami-nvme.service and mounts it at
        # /opt/dlami/nvme. Do not format /dev/nvme1n1 here: it is already
        # an LVM physical volume by the time this script runs.
        pre-runner-script: |
          echo '=== Dead man switch: self-stop in 3 hours if not terminated ==='
          shutdown -h +180
          echo '=== Checking DLAMI ephemeral NVMe mount ==='
          systemctl start dlami-nvme.service
          mountpoint /opt/dlami/nvme 
          df -h /opt/dlami/nvme
          echo 'Relocating Docker and containerd storage to DLAMI ephemeral NVMe...'
          mkdir -p /opt/dlami/nvme/docker
          mkdir -p /opt/dlami/nvme/containerd
          systemctl stop docker
          systemctl stop docker.socket
          systemctl stop containerd
          rm -rf /var/lib/docker
          rm -rf /var/lib/containerd
          mkdir -p /var/lib/docker
          mkdir -p /var/lib/containerd
          mount --bind /opt/dlami/nvme/docker /var/lib/docker
          mount --bind /opt/dlami/nvme/containerd /var/lib/containerd
          mountpoint /var/lib/docker
          mountpoint /var/lib/containerd
          df -h /var/lib/docker
          df -h /var/lib/containerd
          systemctl start containerd
          systemctl start docker
          echo 'Binding GitHub runner work directory to DLAMI ephemeral NVMe...'
          mkdir -p /opt/dlami/nvme/work
          mkdir -p _work
          mount --bind /opt/dlami/nvme/work _work
          mountpoint _work
          df -h _work
          echo '=== DLAMI ephemeral NVMe setup complete ==='

    - name: Check provisioning result
      id: result
      shell: bash
      run: |
        if [ "${{ steps.start.outcome }}" != "success" ]; then
          echo "::warning::EC2 GPU runner provisioning failed — will fall back to static runner"
        else
          echo "label=${{ steps.start.outputs.label }}" >> "$GITHUB_OUTPUT"
          echo "ec2-instance-id=${{ steps.start.outputs.ec2-instance-id }}" >> "$GITHUB_OUTPUT"
        fi
